baseURL = 'https://matthias-vdc.github.io/'
languageCode = 'en-us'
title = 'Matthias Van de Casteele'
theme = ["PaperMod"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "dracula"

[params]
  defaultTheme = "dark"
  disableThemeToggle = false

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params.assets]
    favicon = "favicon.svg"
